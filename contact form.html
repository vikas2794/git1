<html>
    <head>
        <title>Contact form</title>
    </head>
    <body>
        <form action="/" method="get">
            <table>
                <tbody>
                    <tr>
                        <td><label for="name">Name</label></td>
                        <td><input type="text" name="name" id="name" required></td>
                    </tr>
                    <tr>
                        <td><label for="email">Email</label></td>
                        <td><input type="email" name="email" id="email"></td>
                    </tr>
                    <tr>
                        <td><label for="phone">Phone</label></td>
                        <td><input type="tel" name="phone" id="phone" minlength="10" maxlength="10" required></td>
                    </tr>
                    <tr>
                        <td><label for=>Gender</label></td>
                        <td>
                            <input type="radio" name="gender" id="male">Male
                            <input type="radio" name="gender" id="female">Female
                        </td>
                    </tr>
                    <tr>
                        <td><label for="profession">Profession</label></td>
                        <td>
                            <select name="profession" id="profession">
                                <option value="seller">Seller</option>
                                <option value="shopkeeper">Shopkeeper</option>
                                <option value="student">Student</option>
                                <option value="house husband">House husband</option>
    
                            </select>
                        </td>
                    </tr>
                    <tr style="vertical-align: top;">
                        <td>
                            <label for="message">Message</label>
                        </td>
                        <td>
                            <textarea name="message" id="message" cols="30" rows="10"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="checkbox" name="tnc" id="tnc">
                            <label for="tnc">I accept the terms and condition</label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button type="reset">Reser</button>
                        </td>
                        <td style="text-align: right;">
                            <button type="submit">Submit</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </body>

</html>
